{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Complaint</title>
    <link rel="stylesheet" href="{% static 'css/police-service.css' %}">
    
    <!-- Bootstrap CSS link -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="{% url 'homepage' %}">
            <img src="{% static 'images/logo.png' %}" width="120" height="60" class="d-inline-block align-top" alt="">
            Ward Council Management
        </a>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNavDropdown">
            <ul class="navbar-nav">
                <!-- Your navbar items -->
            </ul>
        </div>
    </nav>

    <header>
        <h1>Submit Complaint to Police</h1>
    </header>

    <div class="container">
        <main class="form">
            <form id="complaintForm" action="{% url 'submit_complaint' %}" method="POST">
                {% csrf_token %}
                <label for="complainant_name">Your Name:</label>
                <input type="text" id="complainant_name" name="complainant_name" required>
                <br>
                <label for="contact_number">Contact Number:</label>
                <input type="tel" id="contact_number" name="contact_number" pattern="[0-9]{10}" required>
                <br>
                <label for="address">Address:</label>
                <input type="text" id="address" name="address" required>
                <br>
                <label for="subject">Subject:</label>
                <input type="text" id="subject" name="subject" required>
                <br>
                <label for="complaint_text">Complaint:</label>
                <textarea id="complaint_text" name="complaint_text" required></textarea>
                <br>
                <button type="submit">Submit</button>
            </form>
        </main>
    
        <aside class="emergency">
            <h2>Emergency Helpline</h2>
            <p>Call <strong>999</strong> for immediate assistance.</p>
            <p>For direct call: <a href="tel:999">999</a></p>
        </aside>
    </div>

    <footer>
        <p>&copy; 2024 All Rights Reserved</p>
    </footer>

    <!-- Bootstrap JS and jQuery scripts -->
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
</body>
</html>
